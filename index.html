<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireRewards - Secure Processing System Nodes</title>
    <!-- Google reCAPTCHA API Script -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-color: #1a1a1e;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-orange: #f97316;
            --accent-cyan: #06b6d4;
            --input-bg: #27272a;
            --input-border: #3f3f46;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--accent-orange);
            font-size: 2rem;
            margin: 0;
            font-weight: 700;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 5px 0 0 0;
        }

        .card {
            background-color: var(--card-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: var(--accent-orange);
            font-size: 1.1rem;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .btn-google {
            width: 100%;
            background-color: #ffffff;
            color: #1f2937;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }

        .btn-google:hover {
            background-color: #f3f4f6;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--input-border);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .form-group {
            margin-bottom: 16px;
        }

        .form-control {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 14px;
            border-radius: 8px;
            color: var(--text-primary);
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        /* Center the reCAPTCHA widget neatly inside the layout box */
        .recaptcha-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            min-height: 78px;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, #06b6d4 0%, #0891b2 100%);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .footer-links p {
            margin: 8px 0;
            color: var(--text-secondary);
        }

        .footer-links a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a.forgot-link {
            color: var(--accent-orange);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>FireRewards</h1>
            <p>Secure Processing System Nodes</p>
        </div>

        <div class="card">
            <h2>Account Sign In</h2>
            <div class="subtitle">Sign in to sync your diamond rewards database across nodes.</div>

            <!-- Google Authentication Option -->
            <button class="btn-google" id="googleSignInBtn">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/copy_of_24dp.png" alt="Google logo" width="18" height="18">
                Continue with Google
            </button>

            <div class="divider">OR LOG IN WITH EMAIL</div>

            <!-- Email/Password Credentials Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <input type="email" id="emailInput" class="form-control" placeholder="Enter Account Email Address" required>
                </div>

                <div class="form-group">
                    <input type="password" id="passwordInput" class="form-control" placeholder="Enter Security Password" required>
                </div>

                <!-- Google reCAPTCHA v2 Widget Container -->
                <div class="recaptcha-wrapper">
                    <div class="g-recaptcha" data-theme="dark" data-sitekey="6LfAl0ItAAAAALWGLfnOVj47bj8Rlj-iteZ19qys"></div>
                </div>

                <button type="submit" class="btn-submit">Secure Account Sign In</button>
            </form>

            <div class="footer-links">
                <p>Don't have an account? <a href="#">Register Here</a></p>
                <p><a href="#" class="forgot-link">Forgot Password Details?</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            // Client-side verification: check if user cleared the reCAPTCHA challenge
            const recaptchaResponse = grecaptcha.getResponse();

            if (recaptchaResponse.length === 0) {
                alert("Security Verification Failed: Please complete the reCAPTCHA checkbox challenge.");
                return;
            }

            // Capture raw input parameters safely
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;

            console.log("Client-side validation passed. Ready for Firebase execution node.");
            
            // NEXT STEP: Insert your production Firebase authentication execution block below
        }
    </script>

</body>
</html>
