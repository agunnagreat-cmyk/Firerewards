<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireRewards Production Core</title>

    <style>
        :root {
            --bg-dark: #121214;
            --card-dark: #1a1a1e;
            --accent-gold: #ff9f43;
            --accent-cyan: #00d2d3;
            --accent-blue: #0abde3;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            
            /* Light Theme Overrides */
            --bg-light: #f5f6fa;
            --card-light: #ffffff;
            --text-dark: #2f3640;
            --danger-red: #ff4757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        body.light-theme {
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        .app-view {
            display: none;
            min-height: 100vh;
            padding: 20px 15px 90px 15px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .active-view {
            display: block;
        }

        .card {
            background: var(--card-dark);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: background 0.3s;
        }

        body.light-theme .card {
            background: var(--card-light);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .alert-banner {
            background: #ff4d4d;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .network-bar {
            background: #2ed573;
            color: white;
            text-align: center;
            font-size: 11px;
            padding: 4px;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: none;
        }
        .network-bar.offline {
            background: #ff4757;
            display: block;
        }
